name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache bun dependencies for web apps
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'apps/fixo-web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # hmls-web is in a Bun workspace with packages/shared — install at root
      # so the @hmls/shared symlink lands in apps/hmls-web/node_modules.
      - name: Install hmls-web dependencies (workspace)
        run: bun install --frozen-lockfile

      - name: Check image payload budget (hmls-web)
        run: |
          MAX_KB=500
          fail=0
          while IFS= read -r -d '' f; do
            kb=$(( $(wc -c < "$f") / 1024 ))
            if [ "$kb" -gt "$MAX_KB" ]; then
              echo "::error file=$f::$f is ${kb} KB (max ${MAX_KB} KB). Pre-generate smaller WebP variants and wire them via lib/image-loader.ts."
              fail=1
            fi
          done < <(find apps/hmls-web/public -type f \
            \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \
               -o -iname "*.webp" -o -iname "*.gif" -o -iname "*.avif" \) -print0)
          exit "$fail"

      - name: Lint (hmls-web)
        run: cd apps/hmls-web && bun run lint

      - name: Type Check (hmls-web)
        run: cd apps/hmls-web && bun run typecheck

      - name: Test (hmls-web)
        run: cd apps/hmls-web && bun run test

      - name: Build (hmls-web)
        run: cd apps/hmls-web && bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Install fixo-web dependencies
        run: cd apps/fixo-web && bun install --frozen-lockfile

      - name: Lint (fixo-web)
        run: cd apps/fixo-web && bun run lint

      - name: Type Check (fixo-web)
        run: cd apps/fixo-web && bun run typecheck

      - name: Build (fixo-web)
        run: cd apps/fixo-web && bun run build --webpack
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Lint (deno)
        run: deno task lint

      - name: Format Check (deno)
        run: deno task fmt:check

      - name: Check API
        run: deno task check

      - name: Test API
        run: deno task test

  schema:
    name: Schema drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Build the DB from schema.ts + local-seed.sql on a clean Postgres, then
      # assert a second `db:push` reports no changes. Fails if schema.ts won't
      # build, local-seed.sql rot, or the two disagree.
      - name: Rebuild from code + drift check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: scripts/db-local-reset.sh check
